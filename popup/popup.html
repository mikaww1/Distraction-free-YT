<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Distraction Free YT</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div class="header-icon-wrap">
          <svg viewBox="0 0 24 24" class="header-icon" aria-hidden="true">
            <path d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z"/>
          </svg>
        </div>
        <div class="header-text">
          <div class="header-top-row">
            <h1>Your YouTube, your rules.</h1>
            <span class="filter-chip" id="filterChip">0 filters active</span>
          </div>
          <p class="subtitle">Hide what steals your time. Keep what matters.</p>
        </div>
      </header>

      <div class="section-label">Feed</div>

      <label class="toggle-row">
        <span class="toggle-label">
          <svg class="row-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 10h16M4 14h8M4 18h8"/></svg>
          Shorts
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideShorts" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="toggle-row">
        <span class="toggle-label">
          <svg class="row-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          Home recommendations
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideHomeRecommendations" />
          <span class="slider"></span>
        </span>
      </label>

      <div class="section-label">While watching</div>

      <label class="toggle-row">
        <span class="toggle-label">
          <svg class="row-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Comments
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideComments" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="toggle-row">
        <span class="toggle-label">
          <svg class="row-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3l14 9-14 9V3z"/></svg>
          Related videos
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideRecommendations" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="toggle-row last">
        <span class="toggle-label">
          <svg class="row-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M18.364 18.364A9 9 0 0 0 5.636 5.636m12.728 12.728L5.636 5.636M18.364 18.364 5.636 5.636"/></svg>
          Ads
        </span>
        <span class="toggle-switch">
          <input type="checkbox" id="hideAds" />
          <span class="slider"></span>
        </span>
      </label>
    </main>

    <script src="../src/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
